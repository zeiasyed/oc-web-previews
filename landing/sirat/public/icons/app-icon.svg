<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFC833"/>
    </linearGradient>
    <filter id="shrineGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#4a4a68"/>

  <g transform="translate(256 210)" filter="url(#shrineGlow)" stroke="url(#goldGrad)" stroke-width="6" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Minarets -->
    <line x1="-118" y1="95" x2="-118" y2="-95"/>
    <line x1="118" y1="95" x2="118" y2="-95"/>
    <circle cx="-118" cy="-108" r="10" fill="#FFE566" stroke="#FFD866" stroke-width="3"/>
    <circle cx="118" cy="-108" r="10" fill="#FFE566" stroke="#FFD866" stroke-width="3"/>

    <!-- Dome -->
    <path d="M-78 18 Q0 -108 78 18" stroke-width="7"/>

    <!-- Flag -->
    <line x1="0" y1="-108" x2="0" y2="-138" stroke-width="5"/>
    <path d="M0 -138 L28 -126 L0 -114 Z" fill="#FFE566" stroke="#FFD866" stroke-width="3"/>

    <!-- Base -->
    <rect x="-92" y="18" width="184" height="78" rx="6" stroke-width="6"/>

    <!-- Arches -->
    <path d="M-58 96 L-58 52 Q-42 34 -26 52 L-26 96"/>
