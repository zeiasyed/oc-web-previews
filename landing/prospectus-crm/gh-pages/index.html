<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta name="robots" content="noindex, nofollow">
  <title>Prospectus</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header" id="app-header">
      <h1>Prospectus</h1>
      <p>Sales CRM · zeiasyed@nexa-care.com</p>
    </header>

    <main id="main">
      <section id="screen-leads" class="screen active" aria-label="Leads">
        <div id="due-banner" class="due-banner hidden"></div>
        <div class="search-bar">
          <input type="search" id="lead-search" placeholder="Search name, company, city…" autocomplete="off">
        </div>
        <div class="filter-row">
          <select id="filter-funnel" aria-label="Filter by funnel">
            <option value="">All funnels</option>
          </select>
          <select id="filter-temp" aria-label="Filter by temperature">
            <option value="">All temps</option>
            <option value="hot">Hot</option>
            <option value="warm">Warm</option>
            <option value="cool">Cool</option>
            <option value="dead">Dead only</option>
          </select>
        </div>
        <label class="filter-dead-toggle hidden" id="dead-toggle-wrap">
          <input type="checkbox" id="show-dead"> Show dead leads
        </label>
        <div id="lead-list" class="lead-list" role="list"></div>
      </section>

      <section id="screen-near" class="screen" aria-label="Near me">
        <div id="near-status" class="near-status">Tap refresh to find leads near you.</div>
        <button type="button" class="btn-primary" id="near-refresh" style="width:100%;margin-bottom:12px">Refresh location</button>
        <div id="near-list" class="lead-list"></div>
      </section>

      <section id="screen-tasks" class="screen" aria-label="Tasks">
        <div class="screen-header" style="margin-bottom:12px">
          <h2 style="margin:0;flex:1">Tasks</h2>
          <button type="button" class="btn-primary" id="add-task-global" style="min-height:36px;padding:8px 14px">+ Task</button>
        </div>
        <div id="task-list" class="task-list"></div>
      </section>

      <section id="screen-more" class="screen" aria-label="More">
        <div class="settings-section">
          <h3>Cloud sync</h3>
          <p class="muted small">Account: zeiasyed@nexa-care.com</p>
          <p class="muted small" id="sync-status-label">Not synced yet</p>
          <div class="form-group">
            <label for="sync-api-url">Sync API URL</label>
            <input type="url" id="sync-api-url" placeholder="https://prospectus-crm-sync….workers.dev">
          </div>
          <div class="form-group">
            <label for="sync-token">Sync token</label>
            <input type="password" id="sync-token" placeholder="Your sync password" autocomplete="off">
          </div>
          <button type="button" class="btn-primary" id="sync-now-btn" style="width:100%;margin-bottom:8px">Sync now</button>
          <label class="filter-dead-toggle">
            <input type="checkbox" id="reminders-enabled" checked> Follow-up reminders
          </label>
        </div>
        <div class="settings-section">
          <h3>City search</h3>
          <div class="search-bar">
            <input type="search" id="city-search" placeholder="Search by city…" autocomplete="off">
          </div>
          <div id="city-suggestions" class="city-suggestions"></div>
          <div id="city-list" class="lead-list"></div>
        </div>
        <div class="settings-section">
          <h3>Quick actions</h3>
          <button type="button" class="btn-primary" id="more-scan" style="width:100%;margin-bottom:8px">Scan business card</button>
          <button type="button" class="btn-secondary" id="more-manual" style="width:100%">Add lead manually</button>
        </div>
        <div class="settings-section">
          <h3>Sales funnels</h3>
          <ul id="funnel-list" class="funnel-list"></ul>
          <div class="form-row">
            <input type="text" id="new-funnel-name" placeholder="New funnel name">
            <button type="button" class="btn-secondary" id="add-funnel-btn">Add</button>
          </div>
        </div>
        <div class="settings-section">
          <h3>Data</h3>
          <button type="button" class="btn-secondary" id="export-btn" style="width:100%;margin-bottom:8px">Export backup</button>
          <label class="btn-secondary" style="display:block;text-align:center;cursor:pointer;margin-bottom:8px">
            Import backup
            <input type="file" id="import-file" accept="application/json,.json" class="hidden-input">
          </label>
          <button type="button" class="btn-secondary" id="seed-btn" style="width:100%;margin-bottom:8px">Load demo data</button>
          <button type="button" class="btn-danger" id="clear-btn" style="width:100%">Clear all data</button>
        </div>
      </section>

      <section id="screen-add" class="screen" aria-label="Add lead">
        <div class="screen-header">
          <button type="button" class="btn-ghost" id="add-back" aria-label="Back">←</button>
          <h2>Add lead</h2>
          <span class="header-spacer"></span>
        </div>
        <div class="add-screen">
          <button type="button" class="add-option" id="opt-scan">
            <span class="add-option-icon">📷</span>
            <div>
              <strong>Scan business card</strong>
              <span>Take a photo or pick from gallery</span>
            </div>
          </button>
          <button type="button" class="add-option" id="opt-manual">
            <span class="add-option-icon">✏️</span>
            <div>
              <strong>Enter manually</strong>
              <span>Type contact details yourself</span>
            </div>
          </button>
        </div>
      </section>

      <section id="screen-form" class="screen" aria-label="Lead form"></section>
      <section id="screen-detail" class="screen" aria-label="Lead detail"></section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button type="button" class="nav-btn active" data-screen="leads">
        <span class="nav-icon">👥</span>
        Leads
      </button>
      <button type="button" class="nav-btn" data-screen="near">
        <span class="nav-icon">📍</span>
        Near Me
      </button>
      <button type="button" class="nav-btn nav-btn-fab" data-screen="add" aria-label="Add lead">
        <span class="nav-fab">+</span>
      </button>
      <button type="button" class="nav-btn" data-screen="tasks">
        <span class="nav-icon">☑️</span>
        Tasks
      </button>
      <button type="button" class="nav-btn" data-screen="more">
        <span class="nav-icon">⚙️</span>
        More
      </button>
    </nav>
  </div>

  <div id="scan-overlay" class="scan-overlay hidden" role="status" aria-live="polite">
    <div class="scan-spinner"></div>
    <p id="scan-status">Reading card…</p>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <input type="file" id="card-camera" accept="image/*" capture="environment" class="hidden-input">
  <input type="file" id="card-gallery" accept="image/*" class="hidden-input">

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
