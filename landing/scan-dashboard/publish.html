<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospect dashboard | Solena</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .publish-wrap { max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
    .publish-hero { margin-bottom: 1.25rem; }
    .publish-hero h1 { font-size: 1.45rem; margin: 0 0 0.35rem; }
    .prospect-grid { display: grid; gap: 0.65rem; margin: 1rem 0; }
    .prospect-row { display: flex; justify-content: space-between; gap: 1rem; font-size: 0.92rem; }
    .prospect-row strong { color: var(--text); min-width: 7rem; }
    .prospect-row span, .prospect-row a { color: var(--muted); text-align: right; word-break: break-word; }
    .publish-big {
      width: 100%;
      font-size: 1.05rem;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      margin: 1rem 0 0.5rem;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #052e1a;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .publish-big:disabled { opacity: 0.6; cursor: wait; }
    .btn-sms {
      width: 100%;
      font-size: 1rem;
      padding: 0.9rem 1.15rem;
      border-radius: 12px;
      margin-top: 0.5rem;
      background: var(--card);
      border: 2px solid var(--accent);
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }
    .btn-sms:disabled { opacity: 0.5; cursor: not-allowed; }
    .publish-links { display: grid; gap: 0.75rem; margin-top: 1rem; }
    .publish-links a {
      display: block;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--accent);
      font-weight: 600;
      text-align: center;
      text-decoration: none;
    }
    .publish-token { margin-bottom: 1rem; }
    .copy-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .copy-row input { flex: 1; margin: 0; font-size: 0.85rem; }
    .copy-row button { white-space: nowrap; }
    .alert-banner {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="publish-wrap">
    <div class="publish-hero">
      <h1>Prospect dashboard</h1>
      <p class="sub" id="subtitle">Build their preview site while Alex is on the call.</p>
    </div>

    <div id="alert-banner" class="alert-banner hidden">
      Alex has been on this call for 1+ minute — you may get a transfer soon.
    </div>

    <div id="lead-panel" class="card hidden">
      <h2 id="company-name" style="margin:0 0 0.25rem"></h2>
      <p class="muted" id="lead-meta"></p>

      <div id="prospect-details" class="prospect-grid"></div>

      <button type="button" id="publish-btn" class="publish-big">Build their new site</button>
      <button type="button" id="send-sms-btn" class="btn-sms hidden" disabled>Send preview link to plumber via text</button>
      <p id="status" class="muted"></p>
      <div id="links" class="publish-links hidden"></div>
    </div>

    <p id="error" class="error"></p>
  </div>
  <script src="../assets/branding.js"></script>
  <script src="publish.js"></script>
</body>
</html>
