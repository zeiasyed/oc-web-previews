<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospect dashboard | Solena</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .publish-wrap { max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
    .publish-hero { margin-bottom: 1.25rem; }
    .publish-hero h1 { font-size: 1.45rem; margin: 0 0 0.35rem; }
    .alert-banner {
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="publish-wrap">
    <div class="publish-hero">
      <h1>Prospect dashboard</h1>
      <p class="sub" id="subtitle">Review lead info → create site → push link to the plumber.</p>
    </div>

    <div id="alert-banner" class="alert-banner hidden">
      Alex has been on this call for 1+ minute — you may get a transfer soon.
    </div>

    <div id="wizard-root"></div>
    <p id="error" class="error"></p>
  </div>
  <script src="../assets/branding.js?v=3"></script>
  <script src="publish-main.js?v=3"></script>
</body>
</html>
