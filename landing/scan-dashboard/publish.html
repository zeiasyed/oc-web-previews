<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish preview site | Solena</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .publish-wrap { max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
    .publish-hero { text-align: center; margin-bottom: 1.5rem; }
    .publish-hero h1 { font-size: 1.5rem; margin: 0 0 0.35rem; }
    .publish-big {
      width: 100%;
      font-size: 1.15rem;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      margin: 1rem 0;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #052e1a;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .publish-big:disabled { opacity: 0.6; cursor: wait; }
    .publish-links { display: grid; gap: 0.75rem; margin-top: 1rem; }
    .publish-links a {
      display: block;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--accent);
      font-weight: 600;
      text-align: center;
      text-decoration: none;
    }
    .publish-token { margin-bottom: 1rem; }
    .copy-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .copy-row input { flex: 1; margin: 0; font-size: 0.85rem; }
    .copy-row button { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="publish-wrap">
    <div class="publish-hero">
      <h1>Publish preview site</h1>
      <p class="sub" id="subtitle">One tap — live public site in seconds.</p>
    </div>

    <div id="token-panel" class="card publish-token hidden">
      <label for="api-token">API token</label>
      <input id="api-token" type="password" placeholder="Outreach API token">
      <button type="button" id="save-token" style="margin-top:0.5rem">Save token</button>
    </div>

    <div id="lead-panel" class="card hidden">
      <h2 id="company-name" style="margin:0 0 0.25rem"></h2>
      <p class="muted" id="lead-meta"></p>
      <button type="button" id="publish-btn" class="publish-big">🚀 Publish preview site now</button>
      <p id="status" class="muted"></p>
      <div id="links" class="publish-links hidden"></div>
    </div>

    <p id="error" class="error"></p>
  </div>
  <script src="../assets/branding.js"></script>
  <script src="publish.js"></script>
</body>
</html>
