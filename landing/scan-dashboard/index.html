<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scan Dashboard | Solena Digital</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <section id="login" class="card login">
      <h1>QR Scan Dashboard</h1>
      <p class="sub">Track postcard QR scans (printed URLs unchanged).</p>
      <label for="password">Dashboard password</label>
      <input id="password" type="password" autocomplete="current-password">
      <button id="login-btn" type="button">Sign in</button>
      <p id="login-error" class="error"></p>
    </section>

    <section id="dashboard" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem">
        <div>
          <h1>QR Scan Dashboard</h1>
          <p id="status" class="sub"></p>
        </div>
        <div style="display:flex;gap:0.5rem">
          <button id="refresh-btn" type="button">Refresh</button>
          <button id="logout-btn" type="button">Sign out</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><strong id="total-scans">0</strong><span>Total scans</span></div>
        <div class="stat"><strong id="slug-count">0</strong><span>Businesses scanned</span></div>
      </div>

      <div class="card">
        <h2 style="margin-top:0">Scans by business</h2>
        <table>
          <thead><tr><th>Business</th><th>Scans</th><th>Last scan</th></tr></thead>
          <tbody id="slug-table"></tbody>
        </table>
      </div>

      <div class="card">
        <h2 style="margin-top:0">Recent scans</h2>
        <table>
          <thead><tr><th>Business</th><th>When</th></tr></thead>
          <tbody id="recent-table"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="../assets/branding.js"></script>
  <script src="../assets/businesses.js"></script>
  <script src="app.js"></script>
</body>
</html>
