# Host nginx on the VPS — Cloudflare proxies HTTPS to port 80 here.
# Internal containers listen on 127.0.0.1:8070 (NexaDirect) and :8071 (NexaSource).

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name demo-videos.nexa-trials.com _;

  location /videos/ {
    include /etc/nginx/nexa-video-auth.conf;
    alias /opt/nexa-labs/data/client-videos/;
    types { video/mp4 mp4; }
    default_type video/mp4;
    add_header Cache-Control "private, no-store";
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name demo-direct.nexa-trials.com demo-edc.nexa-trials.com;

  client_max_body_size 32m;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_pass http://127.0.0.1:8070;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name demo-source.nexa-trials.com demo-source-edc.nexa-trials.com;

  client_max_body_size 32m;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_pass http://127.0.0.1:8071;
  }
}
