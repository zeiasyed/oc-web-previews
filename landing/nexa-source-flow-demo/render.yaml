# Render Blueprint — always-on NexaSource lab demo
# Deploy: https://render.com/deploy?repo=https://github.com/zeiasyed/oc-web-previews
services:
  - type: web
    name: nexasource-demo
    runtime: docker
    rootDir: landing/nexa-source-flow-demo
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LAB_AUTH_USER
        sync: false
      - key: LAB_AUTH_PASSWORD
        sync: false
      - key: EDC_PUBLIC_BASE
        value: /edc
      - key: SCRIPT_ROOT
        value: /edc
