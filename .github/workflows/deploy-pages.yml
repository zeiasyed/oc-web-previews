name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build slim Pages site
        run: |
          mkdir -p _site/landing
          rsync -a landing/ _site/landing/ \
            --exclude 'node_modules' \
            --exclude '.venv' \
            --exclude 'output' \
            --exclude '__pycache__' \
            --exclude '.cursor' \
            --exclude '.playwright-cf-profile' \
            --exclude '.git'
          if [ -f CNAME ]; then cp CNAME _site/; fi
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
