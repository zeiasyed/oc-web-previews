name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build Pages site
        run: |
          mkdir -p _site/landing
          # Prospectus CRM
          rsync -a landing/prospectus-crm/ _site/landing/prospectus-crm/
          # Existing published apps
          for dir in scan-dashboard connect.html pricing.html register.html payment.html assets; do
            if [ -e "landing/$dir" ]; then
              cp -r "landing/$dir" _site/landing/
            fi
          done
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
